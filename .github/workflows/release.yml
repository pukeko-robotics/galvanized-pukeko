name: Release

# Manually-dispatched release pipeline for galvanized-pukeko. Publishes the ONE
# public package @galvanized-pukeko/vue-ui; the web-client + agent-adk packages are
# private examples and are not published.
#
# Shaped after gaunt-sloth's release.yml. Three chained gates, the irreversible
# publish last so it is reached only after every gate is green:
#
#   unit-tests  ->  e2e (Koog + ADK Playwright, Google AI Studio)  ->  release
#
# RELEASE-VERSIONING MODEL B — "release CURRENT, then post-bump to next".
# `main` HEAD always carries the *next* version to publish. A run ships whatever
# version is currently in vue-ui's package.json, and ONLY AFTER a successful publish
# does it bump to the next version and commit/push. So the run is idempotent at the
# version level: a failed publish leaves the version unchanged (re-dispatch retries
# the SAME version); a successful one moves it so it can't be re-shipped. The
# dispatch inputs describe the POST-bump (applied AFTER this release), NOT the
# version shipped now.
#
# Publishing uses npm Trusted Publishing (OIDC) — no NPM_TOKEN, just `id-token: write`.
#
# ┌─ STAYS RED UNTIL ANDREW configures two things (the workflow is correct to land):
# │   1. Repo secret GOOGLE_API_KEY  (Google AI Studio key) — the e2e job needs it.
# │   2. npm Trusted Publisher for @galvanized-pukeko/vue-ui, bound to this repo +
# │      workflow file (release.yml) + environment `release` — the publish step needs it.
# └─ Also temporary: the "Build AG-UI kotlin-core to mavenLocal" e2e step. The encoder
#     is now vendored into the consumers (BE-7), so this builds kotlin-core ONLY. Remove
#     the whole step once kotlin-core is on Maven Central (see .github/mavenlocal/README.md);
#     mavenCentral() will then resolve it directly.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'POST-bump verb applied to main AFTER this release (sets the NEXT vue-ui version). Not the version shipped now.'
        type: choice
        required: true
        default: prerelease
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
          - explicit
      preid:
        description: 'Prerelease channel for the POST-bump — only used by the pre*/prerelease verbs'
        type: choice
        required: false
        default: alpha
        options:
          - alpha
          - beta
          - rc
      explicit_version:
        description: 'Exact NEXT version (e.g. 0.2.0-alpha.0) for the POST-bump — only used when bump = explicit'
        type: string
        required: false
        default: ''

jobs:
  # Gate 1 — mirror of the repo's Tests-and-Lint job. No root `lint` script exists
  # in galvanized (lint is per-package via oxlint/eslint), so only `pnpm test` runs.
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - uses: actions/checkout@v6
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Tests
        run: pnpm test

