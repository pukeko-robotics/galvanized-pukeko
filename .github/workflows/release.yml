  # Gate 3 — ship the CURRENT vue-ui version via OIDC, then post-bump main to next.
  release:
    name: Publish vue-ui (OIDC), then post-bump main
    needs: e2e
    runs-on: ubuntu-latest
    # Must match the Environment name in npm's Trusted Publisher config: OIDC only
    # mints a token for a job running in this exact environment (+ repo + workflow
    # filename). Andrew: set the npm trusted publisher's environment to `release`.
    environment: release
    permissions:
      contents: write # push the vue-ui tag + the post-bump commit to main
      id-token: write # npm Trusted Publishing (OIDC) + provenance
    steps:
      # Fail BEFORE the irreversible publish, not after. `explicit_version` is the
      # only free-text input (bump/preid are `choice`), so a blank one with
      # bump=explicit is the sole way a bad input reaches here. If the check lived
      # only in the post-bump step (below), we'd publish, THEN abort un-bumped, and a
      # re-dispatch would re-publish the same version → npm 409, wedging the pipeline.
      - name: Validate release inputs (before publish)
        env:
          BUMP: ${{ inputs.bump }}
          EXPLICIT_VERSION: ${{ inputs.explicit_version }}
        run: |
          set -euo pipefail
          if [ "$BUMP" = "explicit" ] && [ -z "$EXPLICIT_VERSION" ]; then
            echo "::error::bump=explicit requires a non-empty explicit_version (e.g. 0.2.0-alpha.0). Refusing to publish." >&2
            exit 1
          fi
          echo "Inputs OK: bump=$BUMP explicit_version='${EXPLICIT_VERSION}'"
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          # Post-bump pushes to main as github-actions[bot] via the default
          # GITHUB_TOKEN (contents: write). If galvanized gains a branch ruleset
          # that rejects the bot push (as gaunt-sloth's CodeQL ruleset does — sloth
          # uses a deploy key to bypass it), add a bypass actor / deploy key for
          # this repo. ANDREW-FOLLOW-UP; does not block the publish above.
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'
          # registry-url writes an OIDC-aware .npmrc for the publish. NOTE: this is
          # the OPPOSITE of gaunt-sloth's release job, which omits registry-url to
          # avoid an .npmrc referencing an unset ${NODE_AUTH_TOKEN}. That footgun is
          # gone on npm >= 11.5.1 (Node 24's bundled npm 11.x), which auto-detects
          # the OIDC environment and exchanges the id-token itself — no NODE_AUTH_TOKEN
          # is read. The `npm install -g npm@latest` step below guarantees that floor.
          registry-url: 'https://registry.npmjs.org'
      - name: Ensure npm supports OIDC Trusted Publishing (>= 11.5.1)
        run: npm install -g npm@latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read CURRENT version to ship (and derive its dist-tag)
        id: current
        run: |
          set -euo pipefail
          PKG=packages/galvanized-pukeko-vue-ui/package.json
          VERSION="$(node -p "require('./$PKG').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # prerelease -> its preid (alpha/beta/rc); stable -> latest.
          DIST_TAG="$(node -p "const s=require('semver');const p=s.prerelease(require('./$PKG').version);p?(p.find(x=>typeof x==='string')||'latest'):'latest'")"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          if [ -n "$(node -p "require('semver').prerelease('$VERSION')?1:''")" ]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Shipping vue-ui version=$VERSION dist_tag=$DIST_TAG"

      - name: Build vue-ui
        run: pnpm --filter @galvanized-pukeko/vue-ui build

      - name: Publish vue-ui to npm via OIDC (Trusted Publishing)
        working-directory: packages/galvanized-pukeko-vue-ui
        # No NPM_TOKEN: the OIDC id-token supplies the credential. Explicit --tag
        # (belt-and-suspenders with publishConfig.tag written by bump-vue-ui.mjs) so
        # a prerelease never lands on `latest`.
        run: npm publish --access public --provenance --tag ${{ steps.current.outputs.dist_tag }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.current.outputs.version }}
          IS_PRERELEASE: ${{ steps.current.outputs.prerelease }}
        run: |
          set -euo pipefail
          PRE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRE_FLAG="--prerelease"
          fi
          # vue-ui- prefixed tag so it can't collide with any future package tags.
          # Idempotent: publish already succeeded and can't be re-run for this
          # version, so if a prior run died between publish and post-bump, a
          # re-dispatch must not fail here on an already-existing release.
          if gh release view "vue-ui-v${VERSION}" >/dev/null 2>&1; then
            echo "Release vue-ui-v${VERSION} already exists — skipping create (idempotent re-dispatch)."
          else
            gh release create "vue-ui-v${VERSION}" --title "vue-ui v${VERSION}" --generate-notes $PRE_FLAG
          fi

      # ----- Only after a successful publish: move main to the NEXT version -----
      - name: Post-bump main to the next version
        id: postbump
        env:
          BUMP: ${{ inputs.bump }}
          PREID: ${{ inputs.preid }}
          EXPLICIT_VERSION: ${{ inputs.explicit_version }}
        run: |
          set -euo pipefail
          if [ "$BUMP" = "explicit" ]; then
            if [ -z "$EXPLICIT_VERSION" ]; then
              echo "::error::bump=explicit requires a non-empty explicit_version (e.g. 0.2.0-alpha.0)" >&2
              exit 1
            fi
            pnpm run release:bump-and-commit -- "$EXPLICIT_VERSION"
          else
            pnpm run release:bump-and-commit -- "$BUMP" "$PREID"
          fi
          NEXT="$(node -p "require('./packages/galvanized-pukeko-vue-ui/package.json').version")"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "main now carries next vue-ui version=$NEXT"

      - name: Push post-bump commit to main
        run: git push origin HEAD:main
