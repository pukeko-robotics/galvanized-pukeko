packages:
  - 'packages/galvanized-pukeko-vue-ui'
  - 'packages/galvanized-pukeko-web-client'

minimumReleaseAgeExclude:
  - '@gaunt-sloth/agent@2.0.0-alpha.5'
  - '@gaunt-sloth/core@2.0.0-alpha.5'

# @gaunt-sloth/agent is consumed from the public npm registry (2.0.0-alpha.x);
# no cross-repo file: redirect is needed — the published package pins its own
# @gaunt-sloth/core by version. The uuid floor keeps a single resolved copy.
overrides:
  uuid: '>=11.1.1'
  # @gaunt-sloth/* 2.0.0-alpha.5 ships zod-4-only schema code (z.looseObject)
  # but still declares the permissive range `^3.25.0 || ^4.0.0`, so pnpm dedupes
  # it onto this repo's own zod 3 and the AG-UI server crashes at boot. Force
  # the gaunt-sloth subtree onto zod 4 (already in the tree). Scoped so this
  # repo's own zod 3 + zod-to-json-schema@3 are untouched. Drop once upstream
  # bumps its zod dep to ^4.
  '@gaunt-sloth/core>zod': '^4.0.0'
  '@gaunt-sloth/agent>zod': '^4.0.0'
  '@gaunt-sloth/review>zod': '^4.0.0'
